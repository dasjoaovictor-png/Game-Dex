<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Dex - Entrar</title>

    <link rel="shortcut icon" href="/img/dpad.svg" type="image/x-icon">

    <link rel="stylesheet" href="/Main/login/login.css">
    <script type="module" src="/Main/login/login.js" defer></script>

    <link rel="stylesheet" href="https://unpkg.com/kursor/dist/kursor.css">
    <script src="https://cdn.jsdelivr.net/npm/kursor"></script>
</head>
<body>
    <main class="login" id="login">

        <div class="cyberGrid"></div>

        <div class="particles">
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
        </div>

        <aside class="welcome">
            <h4>
                Bem-Vindo <br>
                a <br>
                Game Dex!
            </h4>
        </aside>

        <section class="loginSection">
            <h4>Crie Sua Conta</h4>

            <div class="userData">

                <div class="userName">
                    <input type="text" placeholder="Enter Your Name" class="name" id="name" required />
                </div>

                <div class="userEmail">
                    <input type="email" placeholder="Enter Your Email" name="email" class="email" id="email" required />
                </div>

                <div class="userPassword">
                    <input type="password" placeholder="Enter Your Password" class="password" id="password" required />
                </div>
            </div>

            <div class="account">
                <a href="/Main/store/store.html" class="createAccount" id="createAccount">Game Dex</a>
            </div>
        </section>
    </main>
</body>
</html>
